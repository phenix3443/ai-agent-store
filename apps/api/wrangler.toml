# Cloudflare Workers config for the catalog API (apps/api).
# Secrets are NOT stored here — set per environment with:
#   wrangler secret put DATABASE_URL --env test         # Neon (data layer, Drizzle)
#   wrangler secret put NEON_AUTH_JWKS_URL --env test    # Neon Auth (JWT verify)
#
# Deploy:  wrangler deploy --env test        (→ as-api-test.<subdomain>.workers.dev)
#          wrangler deploy --env production   (→ as-api.<subdomain>.workers.dev)

# Top-level name = the production worker (unified naming: prod = as-api,
# test = as-api-test). CI always deploys with `--env test|production`.
name = "as-api"
main = "src/worker.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Online TEST environment
[env.test]
name = "as-api-test"

# Platform-native monitoring: persistent Workers Logs (invocations, errors,
# console output) viewable in the Cloudflare dashboard. No extra dependency.
[env.test.observability]
enabled = true

# Online PRODUCTION environment
[env.production]
name = "as-api"

[env.production.observability]
enabled = true
