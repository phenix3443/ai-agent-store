# Cloudflare Workers config for the catalog API (apps/api).
# Secrets are NOT stored here — set per environment with:
#   wrangler secret put SUPABASE_URL --env test
#   wrangler secret put SUPABASE_ANON_KEY --env test
#
# Deploy:  wrangler deploy --env test        (→ as-api-test.<subdomain>.workers.dev)
#          wrangler deploy --env production   (→ as-api-prod.<subdomain>.workers.dev)

main = "src/worker.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Online TEST environment
[env.test]
name = "as-api-test"

# GitHub usernames allowed to review the catalog (not a secret).
[env.test.vars]
ADMIN_GITHUB_USERNAMES = "phenix3443"

# Platform-native monitoring: persistent Workers Logs (invocations, errors,
# console output) viewable in the Cloudflare dashboard. No extra dependency.
[env.test.observability]
enabled = true

# Online PRODUCTION environment (filled out later)
[env.production]
name = "as-api-prod"

[env.production.vars]
ADMIN_GITHUB_USERNAMES = "phenix3443"

[env.production.observability]
enabled = true
