name: Release desktop app

# Build the Tauri desktop app for macOS (Apple Silicon + Intel) and Windows,
# then publish the installers to a GitHub Release. Triggered by pushing a
# version tag (e.g. `v0.1.0`), or manually via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One macOS universal build on the always-available arm64 runner covers
          # both Apple Silicon and Intel — no scarce macos-13 (Intel) runner needed.
          - host: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-targets: aarch64-apple-darwin x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - host: windows-latest
            rust-targets: ''
            sidecar-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.host }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.5 requires Node >= 22.13 (node:sqlite)
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/cli-gui/src-tauri

      - run: pnpm install --frozen-lockfile

      # Build the internal library packages (@as/types → sdk → client-core) to dist/,
      # which the sidecar compile and the frontend build resolve. turbo builds their
      # dependency graph in order via the build task's `^build` dependency.
      - name: Build workspace libraries
        run: pnpm exec turbo build --filter=@as/client-core

      # Compile the `as` CLI into the sidecar binary Tauri bundles (binaries/as-<triple>).
      # On macOS this builds both arch slices for the universal bundle.
      - name: Build sidecar
        shell: bash
        env:
          SIDECAR_TARGETS: ${{ matrix.sidecar-targets }}
        run: pnpm --filter @as/cli-gui build:sidecar

      # Build the web frontend into apps/cli-gui/dist (frontendDist in tauri.conf.json).
      - name: Build frontend
        run: pnpm --filter @as/cli-gui build

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the toolchain so tauri's universal target detection sees both arch targets.
          RUSTUP_TOOLCHAIN: stable
          # macOS Developer ID signing + notarization. Left empty until an Apple
          # Developer account is approved and these secrets are added — while empty,
          # tauri-action produces the current unsigned build. Once set, it signs and
          # notarizes automatically with no further changes.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/cli-gui
          args: ${{ matrix.tauri-args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Agent Store CLI ${{ github.ref_name }}'
          releaseBody: |
            桌面客户端安装包。

            - macOS: `.dmg`（universal，同时支持 Apple 芯片与 Intel）
            - Windows: `.msi` / `-setup.exe`

            当前为**未签名**构建，首次打开会被系统拦截 —— 属正常现象，**并非文件损坏**：

            - **macOS** 若提示「已损坏，无法打开」：把 App 拖入「应用程序」，然后在终端执行
              ```
              xattr -cr "/Applications/Agent Store CLI.app"
              ```
              再双击打开即可。（这种情况下右键「打开」通常无效，需用上面的命令去除隔离标记。）
            - **Windows** 若提示「未知发布者」：点「更多信息」→「仍要运行」。

            正式的 Apple Developer ID 签名 + 公证（及 Windows 代码签名）接入后，这些提示会消失。
          releaseDraft: false
          prerelease: false
