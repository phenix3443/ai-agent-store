name: Deploy store to Cloudflare

# Builds the Next.js store with OpenNext and deploys it to Cloudflare Workers:
#   push/merge to main → --env test        (agent-store-web-test, test.agent-store.panghuli.tech → test API)
#   push a release tag v* → --env production (agent-store-web,      agent-store.panghuli.tech      → prod API)
# Development happens on feature branches off main (PR-gated by e2e); production
# ships only when you cut a `v*` release tag (same tag drives the desktop release
# in release.yml). The main→test path waits on the e2e workflow (workflow_run) and
# only deploys when apps/store, packages, or the lockfile changed; a release tag
# always deploys. Needs repo secret CLOUDFLARE_API_TOKEN and variable
# CLOUDFLARE_ACCOUNT_ID.
on:
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    # Proceed for release tags and manual dispatch, or when the gating e2e run
    # (main) succeeded.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      env: ${{ steps.decide.outputs.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Decide target env and whether the store changed
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -uo pipefail
          # Release tag → production, always deploy (an explicit release).
          if [ "$EVENT" = "push" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "release tag → deploy production"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Manual dispatch → test.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "env=test" >> "$GITHUB_OUTPUT"
            echo "manual dispatch → deploy test"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # e2e on main succeeded → test, gated on the store actually changing.
          echo "env=test" >> "$GITHUB_OUTPUT"
          PREV=$(gh api "repos/$REPO/actions/workflows/e2e.yml/runs?branch=main&per_page=10" \
            --jq "[.workflow_runs[].head_sha] | map(select(. != \"$HEAD_SHA\")) | .[0] // empty")
          if [ -z "$PREV" ] || ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            echo "no reachable previous run → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "diff range: ${PREV}..${HEAD_SHA}"
          CHANGED=$(git diff --name-only "$PREV" "$HEAD_SHA" || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/store/|packages/|pnpm-lock\.yaml)'; then
            echo "store/packages changed → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "no store/packages change → skip deploy"; echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the internal libs (@as/types → sdk) the store consumes.
      - run: pnpm exec turbo build --filter='@as/store^...'

      # NEXT_PUBLIC_* are baked into the client bundle at build time, so they must
      # match the deploy target's env (server-side API_URL lives in wrangler.jsonc).
      - name: Build (OpenNext)
        run: pnpm --filter @as/store build:cf
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.changes.outputs.env == 'production' && 'https://as-api.phenix3443.workers.dev' || 'https://as-api-test.phenix3443.workers.dev' }}
          NEXT_PUBLIC_SITE_URL: ${{ needs.changes.outputs.env == 'production' && 'https://agent-store.panghuli.tech' || 'https://test.agent-store.panghuli.tech' }}

      - name: Deploy to Cloudflare (${{ needs.changes.outputs.env }})
        run: pnpm --filter @as/store exec wrangler deploy --env ${{ needs.changes.outputs.env }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
