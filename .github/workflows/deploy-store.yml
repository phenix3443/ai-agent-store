name: Deploy store to Cloudflare

# Builds the Next.js store with OpenNext and deploys it to Cloudflare Workers.
# Gated on the e2e workflow (workflow_run) AND on the store actually having
# changed — workflow_run has no native `paths`, so the `changes` job computes the
# diff range from the previous e2e run and only lets `deploy` run when
# apps/store, packages, or the lockfile changed. Needs the repo secret
#   CLOUDFLARE_API_TOKEN — a token with "Edit Cloudflare Workers" permission
# and the CLOUDFLARE_ACCOUNT_ID repo variable.
on:
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    # Only proceed when the gating e2e run succeeded (manual dispatch has no
    # workflow_run context, so allow that path through too).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - name: Decide whether the store changed
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -uo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "manual dispatch → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Previous e2e run on main gives the diff range (covers multi-commit pushes).
          PREV=$(gh api "repos/$REPO/actions/workflows/e2e.yml/runs?branch=main&per_page=10" \
            --jq "[.workflow_runs[].head_sha] | map(select(. != \"$HEAD_SHA\")) | .[0] // empty")
          if [ -z "$PREV" ] || ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            echo "no reachable previous run → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "diff range: ${PREV}..${HEAD_SHA}"
          CHANGED=$(git diff --name-only "$PREV" "$HEAD_SHA" || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/store/|packages/|pnpm-lock\.yaml)'; then
            echo "store/packages changed → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "no store/packages change → skip deploy"; echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the internal libs (@as/types → sdk) the store consumes.
      - run: pnpm exec turbo build --filter='@as/store^...'

      - name: Build (OpenNext)
        run: pnpm --filter @as/store build:cf
        env:
          NEXT_PUBLIC_API_URL: https://as-api-test.phenix3443.workers.dev
          NEXT_PUBLIC_SITE_URL: https://agent-store.panghuli.tech

      - name: Deploy to Cloudflare
        run: pnpm --filter @as/store exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
