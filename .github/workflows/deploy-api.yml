name: Deploy API to Cloudflare

# Deploys the catalog API (apps/api) to Cloudflare Workers:
#   push/merge to main → --env test        (as-api-test  → Neon agent-store-test)
#   push a release tag v* → --env production (as-api       → Neon agent-store)
# Development happens on feature branches off main (PR-gated by e2e); production
# ships only when you cut a `v*` release tag. The main→test path waits on the e2e
# workflow (workflow_run) and only deploys when apps/api, packages, or the lockfile
# changed; a release tag always deploys. Per-env secrets (DATABASE_URL,
# NEON_AUTH_JWKS_URL, WAFFO_*) are set once with
#   wrangler secret put <NAME> --env <test|production>
# and are NOT managed here. Needs repo secret CLOUDFLARE_API_TOKEN and variable
# CLOUDFLARE_ACCOUNT_ID.
on:
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      env: ${{ steps.decide.outputs.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Decide target env and whether the API changed
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -uo pipefail
          if [ "$EVENT" = "push" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "release tag → deploy production"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "env=test" >> "$GITHUB_OUTPUT"
            echo "manual dispatch → deploy test"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "env=test" >> "$GITHUB_OUTPUT"
          PREV=$(gh api "repos/$REPO/actions/workflows/e2e.yml/runs?branch=main&per_page=10" \
            --jq "[.workflow_runs[].head_sha] | map(select(. != \"$HEAD_SHA\")) | .[0] // empty")
          if [ -z "$PREV" ] || ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            echo "no reachable previous run → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "diff range: ${PREV}..${HEAD_SHA}"
          CHANGED=$(git diff --name-only "$PREV" "$HEAD_SHA" || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/|pnpm-lock\.yaml)'; then
            echo "api/packages changed → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "no api/packages change → skip deploy"; echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the internal libs (@as/types) the worker bundles.
      - run: pnpm exec turbo build --filter='@as/api^...'

      - name: Deploy to Cloudflare (${{ needs.changes.outputs.env }})
        run: pnpm --filter @as/api exec wrangler deploy --env ${{ needs.changes.outputs.env }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
