name: Deploy API to Cloudflare

# Deploys the catalog API (apps/api) to Cloudflare Workers, per branch:
#   dev  → --env test        (as-api-test  → Neon agent-store-test)
#   main → --env production   (as-api-prod  → Neon agent-store)
# Same gating as deploy-store: waits on the e2e workflow (workflow_run) and only
# deploys when apps/api, packages, or the lockfile changed on the diff range.
# Per-env secrets (DATABASE_URL, NEON_AUTH_JWKS_URL, WAFFO_*) are set once with
#   wrangler secret put <NAME> --env <test|production>
# and are NOT managed here. Needs repo secret CLOUDFLARE_API_TOKEN and variable
# CLOUDFLARE_ACCOUNT_ID.
on:
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      env: ${{ steps.decide.outputs.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - name: Decide target env and whether the API changed
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          set -uo pipefail
          case "$BRANCH" in
            main) echo "env=production" >> "$GITHUB_OUTPUT" ;;
            dev)  echo "env=test" >> "$GITHUB_OUTPUT" ;;
            *) echo "branch '$BRANCH' is not main/dev → skip"; echo "deploy=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "manual dispatch → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PREV=$(gh api "repos/$REPO/actions/workflows/e2e.yml/runs?branch=$BRANCH&per_page=10" \
            --jq "[.workflow_runs[].head_sha] | map(select(. != \"$HEAD_SHA\")) | .[0] // empty")
          if [ -z "$PREV" ] || ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            echo "no reachable previous run → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "diff range: ${PREV}..${HEAD_SHA}"
          CHANGED=$(git diff --name-only "$PREV" "$HEAD_SHA" || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/|pnpm-lock\.yaml)'; then
            echo "api/packages changed → deploy"; echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "no api/packages change → skip deploy"; echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the internal libs (@as/types) the worker bundles.
      - run: pnpm exec turbo build --filter='@as/api^...'

      - name: Deploy to Cloudflare (${{ needs.changes.outputs.env }})
        run: pnpm --filter @as/api exec wrangler deploy --env ${{ needs.changes.outputs.env }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
