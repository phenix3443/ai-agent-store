name: Crawl catalog

# Crawl providers / skills / MCP servers and upsert them into the store DB as
# pending items (source=crawler) for admin review. Runs daily, or manually.
#
# Requires two repo secrets:
#   SUPABASE_URL                — e.g. https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY   — service_role key (server-trusted writes)
on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Crawl and publish
        run: bun run crawl:catalog --publish
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Lifts the GitHub API rate limit for skill tree walking + MCP star ranking.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
